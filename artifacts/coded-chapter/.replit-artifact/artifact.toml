kind = "web"
previewPath = "/"
title = "Coded Chapter"
version = "1.0.0"
id = "artifacts/coded-chapter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23771

[services.development]
run = "pnpm --filter @workspace/coded-chapter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coded-chapter", "run", "build" ]
publicDir = "artifacts/coded-chapter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23771"
BASE_PATH = "/"
