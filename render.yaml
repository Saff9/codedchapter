services:
  - type: web
    name: codedchapter-backend
    runtime: node
    buildCommand: pnpm install && pnpm --filter backend build
    startCommand: pnpm --filter backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
